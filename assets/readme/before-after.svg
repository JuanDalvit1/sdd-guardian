  <rect x="708" y="176" width="160" height="46" rx="23" fill="#1F7F74"/>
  <text x="746" y="208" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">AFTER</text>

  <text x="104" y="298" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Prompt sprawl</text>
  <text x="708" y="298" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">Durable context system</text>

  <g fill="#E4C9EC" font-family="Segoe UI, Arial, sans-serif" font-size="26">
