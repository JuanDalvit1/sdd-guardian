      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#12312F"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="72" y="110" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Before / After</text>

  <rect x="72" y="144" width="534" height="498" rx="32" fill="#28152F" stroke="#A54D8F" stroke-width="3"/>
  <rect x="676" y="144" width="534" height="498" rx="32" fill="#092625" stroke="#178C7A" stroke-width="3"/>

  <rect x="104" y="176" width="160" height="46" rx="23" fill="#7D3F70"/>
