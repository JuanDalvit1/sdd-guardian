<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#0F2A29"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#13243A"/>
      <stop offset="1" stop-color="#0C1B2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1060" cy="120" r="180" fill="#0EA5E9" fill-opacity="0.12"/>
  <circle cx="140" cy="620" r="220" fill="#14B8A6" fill-opacity="0.12"/>

  <rect x="64" y="64" width="380" height="592" rx="24" fill="url(#panel)" stroke="#1E3A5F"/>
  <rect x="486" y="64" width="650" height="172" rx="24" fill="url(#panel)" stroke="#1E3A5F"/>
  <rect x="486" y="268" width="314" height="180" rx="24" fill="url(#panel)" stroke="#1E3A5F"/>
  <rect x="822" y="268" width="314" height="180" rx="24" fill="url(#panel)" stroke="#1E3A5F"/>
  <rect x="486" y="480" width="650" height="176" rx="24" fill="url(#panel)" stroke="#1E3A5F"/>

  <rect x="96" y="100" width="132" height="40" rx="20" fill="#0F766E"/>
  <text x="115" y="126" fill="#E6FFFB" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">SDD GUARDIAN</text>

  <text x="96" y="198" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Context that</text>
  <text x="96" y="256" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">survives delivery.</text>

  <text x="96" y="322" fill="#BCD2E8" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    Global Codex skill for bootstrapping and maintaining
  </text>
  <text x="96" y="354" fill="#BCD2E8" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    PROJECT.md, STATE.md, modular docs, ADRs, and ops truth.
  </text>

  <rect x="96" y="418" width="316" height="92" rx="18" fill="#0B1627" stroke="#19456C"/>
  <text x="118" y="454" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Small global instruction</text>
  <text x="118" y="486" fill="#BDD4E9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Short, durable, behavioral.</text>

  <rect x="96" y="530" width="316" height="92" rx="18" fill="#0B1627" stroke="#19456C"/>
  <text x="118" y="566" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Modular repo truth</text>
  <text x="118" y="598" fill="#BDD4E9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Architecture, ops, domain, ADRs.</text>

  <text x="520" y="120" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">HOW IT FLOWS</text>
  <text x="520" y="164" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Read the map. Detect drift. Ship code and docs together.</text>

  <g>
    <rect x="520" y="306" width="246" height="104" rx="18" fill="#0A1423" stroke="#17486E"/>
    <text x="544" y="344" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">1. Read first</text>
    <text x="544" y="378" fill="#BDD4E9" font-family="Segoe UI, Arial, sans-serif" font-size="18">PROJECT.md + STATE.md</text>

    <rect x="856" y="306" width="246" height="104" rx="18" fill="#0A1423" stroke="#17486E"/>
    <text x="880" y="344" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">2. Scan repo</text>
    <text x="880" y="378" fill="#BDD4E9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Manifests, CI, env, docs</text>

    <path d="M774 358H846" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <path d="M836 345L856 358L836 371" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <text x="520" y="530" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">3. Update only the impacted docs</text>
    <text x="520" y="572" fill="#BCD2E8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Architecture changes update architecture docs and ADRs.</text>
    <text x="520" y="604" fill="#BCD2E8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Ops changes update runbooks, environments, deploy notes, and state.</text>
  </g>
